name: 🚀 Deploy tunis-buy-sell-buddy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  job1_provision_ec2:
    name: "☁️ Job1 — Provision EC2 (Terraform)"
    runs-on: ubuntu-latest
    outputs:
      ec2_ip: ${{ steps.get_ip.outputs.ec2_ip }}

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: ✅ Vérifier credentials AWS
        run: aws sts get-caller-identity

      - name: 📁 Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: 📋 Terraform Plan
        working-directory: ./terraform
        run: terraform plan -out=tfplan

      - name: ✅ Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan

      - name: 📤 Récupérer l'IP
        id: get_ip
        working-directory: ./terraform
        run: |
          EC2_IP=$(terraform output -raw instance_public_ip)
          echo "ec2_ip=$EC2_IP" >> $GITHUB_OUTPUT
          echo "✅ IP : $EC2_IP"

      - name: ⏳ Attendre SSH
        run: |
          EC2_IP=${{ steps.get_ip.outputs.ec2_ip }}
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > /tmp/key.pem
          chmod 600 /tmp/key.pem
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
               -i /tmp/key.pem ubuntu@$EC2_IP "echo OK" 2>/dev/null | grep -q "OK"; then
              echo "✅ SSH prêt !"
              break
            fi
            echo "Tentative $i/30..."
            sleep 10
          done
          rm -f /tmp/key.pem

  job2_install_prerequisites:
    name: "📦 Job2 — Installation prérequis"
    runs-on: ubuntu-latest
    needs: job1_provision_ec2

    steps:
      - name: 🔑 Clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          ssh-keyscan -H ${{ needs.job1_provision_ec2.outputs.ec2_ip }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: 📦 Installer Node.js + Nginx
        run: |
          ssh -i ~/.ssh/key.pem ubuntu@${{ needs.job1_provision_ec2.outputs.ec2_ip }} << 'ENDSSH'
            set -e
            sudo apt-get update -y
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs nginx git
            sudo systemctl enable nginx
            sudo systemctl start nginx
            echo "✅ Node: $(node --version) | Nginx: $(nginx -v 2>&1)"
          ENDSSH

  job3_deploy_production:
    name: "🚀 Job3 — Mise en production"
    runs-on: ubuntu-latest
    needs: [job1_provision_ec2, job2_install_prerequisites]

    steps:
      - name: 🔑 Clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          ssh-keyscan -H ${{ needs.job1_provision_ec2.outputs.ec2_ip }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: 📥 Cloner le repo
        run: |
          ssh -i ~/.ssh/key.pem ubuntu@${{ needs.job1_provision_ec2.outputs.ec2_ip }} << 'ENDSSH'
            set -e
            APP_DIR="/home/ubuntu/tunis-buy-sell-buddy"
            if [ -d "$APP_DIR/.git" ]; then
              cd $APP_DIR && git pull origin main
            else
              git clone https://github.com/yassinebenrjab97-star/tunis-buy-sell-buddy.git $APP_DIR
            fi
          ENDSSH

      - name: 🔐 Créer .env.production
        run: |
          ssh -i ~/.ssh/key.pem ubuntu@${{ needs.job1_provision_ec2.outputs.ec2_ip }} << ENDSSH
            cat > /home/ubuntu/tunis-buy-sell-buddy/.env.production << 'EOF'
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID=${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          EOF
            echo "✅ .env.production créé"
          ENDSSH

      - name: 🏗️ Build React/Vite
        run: |
          ssh -i ~/.ssh/key.pem ubuntu@${{ needs.job1_provision_ec2.outputs.ec2_ip }} << 'ENDSSH'
            set -e
            cd /home/ubuntu/tunis-buy-sell-buddy
            npm install
            npm run build
            echo "✅ Build OK — $(ls dist/ | wc -l) fichiers dans dist/"
          ENDSSH

      - name: 🌐 Configurer Nginx
        run: |
          ssh -i ~/.ssh/key.pem ubuntu@${{ needs.job1_provision_ec2.outputs.ec2_ip }} << 'ENDSSH'
            set -e
            sudo tee /etc/nginx/sites-available/tunis-buy-sell << 'EOF'
          server {
              listen 80;
              server_name _;
              root /home/ubuntu/tunis-buy-sell-buddy/dist;
              index index.html;
              location / {
                  try_files $uri $uri/ /index.html;
              }
              location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
                  expires 1y;
                  add_header Cache-Control "public, immutable";
              }
          }
          EOF
            sudo ln -sf /etc/nginx/sites-available/tunis-buy-sell /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo chmod o+x /home/ubuntu /home/ubuntu/tunis-buy-sell-buddy
            sudo chmod -R o+r /home/ubuntu/tunis-buy-sell-buddy/dist
            sudo nginx -t
            sudo systemctl reload nginx
          ENDSSH

      - name: 🎉 URL finale
        run: |
          echo "✅ DÉPLOIEMENT RÉUSSI !"
          echo "🌐 http://${{ needs.job1_provision_ec2.outputs.ec2_ip }}"